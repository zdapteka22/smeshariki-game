<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Смешарики — запуск игры</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(160deg,#1a0a2e,#2d1b4e 50%,#0f3460);color:#ffcc00;
font-family:Segoe UI,Arial,sans-serif;text-align:center;padding:24px}
.bar{width:260px;height:12px;background:#333;border-radius:8px;margin:14px auto;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffcc00,#ff9f1c);transition:width .2s}
a{display:inline-block;margin:8px;padding:14px 24px;border-radius:14px;font-weight:800;
text-decoration:none;color:#2a1200;background:linear-gradient(135deg,#ffcc00,#ff9f1c)}
p{color:rgba(255,255,255,.8);max-width:420px;line-height:1.45}
</style>
</head>
<body>
<div id="box">
  <h1>Запуск игры…</h1>
  <div class="bar"><i id="b"></i></div>
  <p id="s">Собираем игру…</p>
</div>
<script>
const N = 9;
const st = document.getElementById('s');
const bar = document.getElementById('b');
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = () => rej(new Error('fail ' + src));
    document.head.appendChild(s);
  });
}
async function assembleFromAssets(base) {
  window.__SM_PARTS = [];
  for (let i = 0; i < N; i++) {
    await loadScript(base + 'assets/p' + i + '.js?v=4');
    bar.style.width = Math.round((i + 1) / N * 100) + '%';
    st.textContent = 'Сборка ' + (i + 1) + '/' + N + '…';
  }
  const b64 = window.__SM_PARTS.join('').replace(/\s+/g, '');
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  location.replace(URL.createObjectURL(new Blob([bytes], { type: 'text/html;charset=utf-8' })));
}
(async () => {
  for (const base of ['', 'https://cdn.jsdelivr.net/gh/zdapteka22/smeshariki-game@main/']) {
    try {
      st.textContent = base ? 'Зеркало jsDelivr…' : 'Загрузка…';
      await assembleFromAssets(base);
      return;
    } catch (e) { console.warn(e); }
  }
  document.getElementById('box').innerHTML =
    '<h1>Нажми, чтобы играть</h1>' +
    '<p><a id="go" href="#">▶ Открыть игру</a></p>' +
    '<p style="font-size:13px">Если не открылось, попробуй зеркало ниже.</p>' +
    '<p><a href="https://litter.catbox.moe/5p6bzx.html">▶ Запасное зеркало</a></p>';
  document.getElementById('go').onclick = async (ev) => {
    ev.preventDefault();
    try {
      await assembleFromAssets('https://cdn.jsdelivr.net/gh/zdapteka22/smeshariki-game@main/');
    } catch (e) {
      location.href = 'https://litter.catbox.moe/5p6bzx.html';
    }
  };
})();
</script>
</body>
</html>
