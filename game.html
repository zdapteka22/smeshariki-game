<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Смешарики — загрузка…</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#1a0a2e;color:#ffcc00;font-family:Arial,sans-serif;
display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center}
a{color:#fff}
.bar{width:240px;height:10px;background:#333;border-radius:6px;margin:12px auto;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:#ffcc00}
</style>
</head>
<body>
<div id="s">
  <h1>Загрузка игры…</h1>
  <div class="bar"><i id="b"></i></div>
  <p id="p">0%</p>
  <p><a href="index.html">← На сайт</a></p>
  <p style="font-size:12px;color:#888">Если долго грузится — открой файл Смешарики_ИГРА.html с рабочего стола</p>
</div>
<script>
window.__SM_PARTS = [];
const N = 9;
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = () => rej(new Error('fail ' + src));
    document.head.appendChild(s);
  });
}
(async () => {
  for (let i = 0; i < N; i++) {
    await loadScript('assets/p' + i + '.js');
    const pct = Math.round((i + 1) / N * 100);
    document.getElementById('p').textContent = pct + '%';
    document.getElementById('b').style.width = pct + '%';
  }
  const b64 = window.__SM_PARTS.join('');
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'text/html;charset=utf-8' });
  location.replace(URL.createObjectURL(blob));
})().catch(e => {
  document.getElementById('s').innerHTML =
    '<h1>Ошибка загрузки</h1><p>' + e +
    '</p><p><a href="https://litter.catbox.moe/2bek2n.html">Открыть игру (запас)</a></p>';
});
</script>
</body>
</html>
